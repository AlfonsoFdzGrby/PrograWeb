<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Motors - Inicio</title>
    <link rel="icon" type="image/x-icon" href="resources/images/tab-icon.png">
    <link rel="stylesheet" href="resources/css/bootstrap.min.css">
</head>

<body class = "bg-light bg-gradient">
    <header class="bg-dark bg-gradient text-white shadow px-4 py-3 d-flex justify-content-between align-items-center flex-wrap">
        <a href="#">
            <img src="resources/images/logo.png" width="250" alt="Logo">
        </a>
        <div class="d-flex gap-5 mt-3 mt-md-0">
            <a class="btn btn-outline-light" href="mision.html" style = "width: 25%;">Misión</a>
            <a class="btn btn-outline-light" href="vision.html" style = "width: 25%;">Visión</a>
            <a class="btn btn-outline-light" href="contacto.html" style = "width: 25%;">Contacto</a>
            <a class="btn btn-outline-light" href="compra.html" style = "width: 25%;">Compra</a>
            <select id="opciones" name="opciones" class = "btn btn-outline-light" style = "appearance: none; width: 25%;" onchange = "if(this.value) window.location.href=this.value;">
                <option value="" disabled selected hidden>
                    Servicios
                </option>
                <option value="accesorios.html">Accesorios</option>
                <option value="seguros.html">Seguros y garantía</option>
            </select>
        </div>
    </header>

    <main>
        <div class = "text-center" style = "font-family: 'Merriwheather';">
            <h2 class = "text-center pt-3">Catálogo de Autos</h2>
            <hr>
            <form>
                <select id="categoria" name="categoria" class = "btn btn-outline-secondary">
                    <option value="" disabled selected hidden>
                        Seleccione una categoría
                    </option>
                    <option value="op1">Deportivos</option>
                    <option value="op2">Todoterreno</option>
                    <option value="op3">Sedanes</option>
                    <option value="op4">De carga</option>
                    <option value="op5">De viaje</option>
                </select>
            </form>
        </div>

        <br>

        <div class="container">
            <div class="row">
                <!-- Producto 1 -->
                <div class="col-md-4 mb-4 d-flex">
                    <div class="card product-card flex-fill" style="cursor: pointer; border: 2px solid transparent;">
                        <img src="https://website-images.mclaren.com/50/mclaren-w1-front-three-quarter.jpg" class="card-img-top" alt="Producto">
                        <div class="card-body d-flex flex-column">
                            <h3 class="card-title">MacLaren W1</h3>
                            <p class="card-text mt-auto">Precio: $ 2,100,000 USD</p>
                        </div>
                    </div>
                </div>

                <!-- Producto 2 -->
                <div class="col-md-4 mb-4 d-flex">
                    <div class="card product-card flex-fill" style="cursor: pointer; border: 2px solid transparent;">
                        <img src="https://cms-assets.autoscout24.com/uaddx06iwzdz/1VkIfekyigl2PGmBZCyeh8/cafbf0103a56e50a7622bc90cb257452/porsche-911-carrera-s-front.jpeg?w=1100" class="card-img-top" alt="Producto">
                        <div class="card-body d-flex flex-column">
                            <h3 class="card-title">Porsche 911</h3>
                            <p class="card-text mt-auto">Precio: $ 122,000 USD</p>
                        </div>
                    </div>
                </div>

                <!-- Producto 3 -->
                <div class="col-md-4 mb-4 d-flex">
                    <div class="card product-card flex-fill" style="cursor: pointer; border: 2px solid transparent;">
                        <img src="https://www.excelenciasdelmotor.com/sites/default/files/inline-images/Chevy_Swing_5P_1996_Blanco.JPG" class="card-img-top" alt="Producto">
                        <div class="card-body d-flex flex-column">
                            <h3 class="card-title">Chevy del marketplace</h3>
                            <p class="card-text mt-auto">Precio: 3 pesos y una vaca</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class = "text-center bg-secondary bg-gradient text-white py-3 mt-auto" style = "font-family: 'Merriwheather';">
        <p>Alfonso Marón Fernández Garibay - Desarrollo Web</p>
        <p>
            <a href="https://jigsaw.w3.org/css-validator/check/referer">
                <img style="border:0;width:88px;height:31px"
                    src="https://jigsaw.w3.org/css-validator/images/vcss-blue"
                    alt="¡CSS Válido!">
            </a>
            <a href="https://jigsaw.w3.org/css-validator/check/referer">
                <img style="border:0;width:88px;height:31px"
                    src="https://www.w3.org/Icons/valid-html401"
                    alt="¡HTML Válido!">
            </a>
        </p>
    </footer>

    <script src="resources/js/bootstrap.bundle.min.js"></script>
</body>

</html>
